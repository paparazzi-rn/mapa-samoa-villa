<head>

  <title>Mapa de Navegação — Samoa Villa</title>
  <style>
    :root{--green:#087352;--deep:#123f2b;--paper:rgba(255,255,255,.94);--shadow:0 8px 26px rgba(0,0,0,.28)}
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#174b31}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;-webkit-text-size-adjust:100%;overscroll-behavior:none}
    button{font:inherit;color:inherit}.app,.viewport{position:relative;width:100%;height:100vh;overflow:hidden}
    .viewport{height:var(--app-height,100vh);background:radial-gradient(circle at 50% 48%,#53835a 0,#285e40 52%,#123f2b 100%);touch-action:none;cursor:grab;isolation:isolate}
    .viewport.dragging{cursor:grabbing}.viewport.fullscreen-fallback{position:fixed;inset:0;z-index:9999;width:100vw;height:100vh;height:var(--app-height,100vh)}
    .scene-fit{position:absolute;left:50%;top:50%;width:100vw;height:200vw;transform:translate(-50%,-50%);filter:drop-shadow(0 10px 30px rgba(0,0,0,.34))}
    .scene-pan{position:absolute;inset:0;transform-origin:50% 50%;will-change:transform}.map-image{display:block;width:100%;height:100%;object-fit:fill;pointer-events:none;user-select:none;-webkit-user-select:none;-webkit-user-drag:none}
    .toolbar{position:absolute;z-index:10;right:12px;bottom:18px;bottom:calc(18px + env(safe-area-inset-bottom));display:grid;gap:8px}
    .control{width:46px;height:46px;border:0;border-radius:11px;background:var(--paper);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .control:active{transform:translateY(1px)}.control svg{width:24px;height:24px;fill:none;stroke:var(--green);stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
    .zoom-badge{position:absolute;z-index:9;right:66px;bottom:23px;bottom:calc(23px + env(safe-area-inset-bottom));min-width:48px;padding:6px 8px;border-radius:8px;background:var(--paper);box-shadow:var(--shadow);color:var(--green);font-size:11px;font-weight:700;text-align:center}
    .brand{position:absolute;z-index:8;left:12px;bottom:8px;bottom:calc(8px + env(safe-area-inset-bottom));color:rgba(255,255,255,.92);font-size:12px;font-weight:700;text-shadow:0 2px 5px rgba(0,0,0,.6);pointer-events:none}
    .hint{position:absolute;z-index:12;left:50%;top:12px;top:calc(12px + env(safe-area-inset-top));transform:translate(-50%,-10px);max-width:calc(100% - 24px);padding:9px 13px;border-radius:10px;background:rgba(18,63,43,.92);color:#fff;font-size:12px;white-space:nowrap;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s}
    .hint.show{opacity:1;transform:translate(-50%,0)}
    @media(min-aspect-ratio:887/1774){.scene-fit{height:100vh;height:var(--app-height,100vh);width:50vh;width:calc(var(--app-height,100vh) * .5)}}
    @media(max-width:820px){.toolbar{right:10px}.control{width:44px;height:44px}.zoom-badge{right:62px}.brand{left:10px;font-size:11px}}
    @media(max-height:520px) and (orientation:landscape){.toolbar{grid-template-columns:repeat(4,44px);bottom:10px}.zoom-badge{right:198px;bottom:17px}.brand{bottom:62px}}
    @media(prefers-reduced-motion:reduce){*{transition-duration:.01ms!important}}
  </style>
</head>
