  <style>
    :root{--green:#087352;--deep:#174a34;--bg:#194a32;--blue:#0787ca;--ink:#203229;--muted:#637168;--paper:#fff;--line:#d9e3dc;--route:#ffe24b;--shadow:0 12px 34px rgba(7,31,20,.3)}

<script>
